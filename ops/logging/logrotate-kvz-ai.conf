# Rotate the file logs written by the systemd units
# (kvz-ai-web / kvz-ai-worker use StandardOutput=append:.../logs/...).
#
# Install on the VPS:
#   sudo cp ops/logging/logrotate-kvz-ai.conf /etc/logrotate.d/kvz-ai
#   sudo logrotate --debug /etc/logrotate.d/kvz-ai   # dry run to verify

/opt/kvz-ai/shared/logs/web/*.log
/opt/kvz-ai/shared/logs/worker/*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}
