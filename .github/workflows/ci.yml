name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check shell scripts
        run: bash -n agent/scripts/poll.sh agent/scripts/handle_task.sh ops/deploy/deploy-release.sh

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Connector tests (kb-docs)
        run: |
          cd connectors/kb-docs
          npm ci || npm install
          npm run typecheck
          npm test

      - name: DB integration tests (migrations + functions + RLS)
        run: |
          # initdb/pg_ctl live under /usr/lib/postgresql/<ver>/bin on the runner
          PGBIN="$(ls -d /usr/lib/postgresql/*/bin 2>/dev/null | sort -V | tail -1 || true)"
          [ -n "$PGBIN" ] && export PATH="$PGBIN:$PATH"
          ./scripts/db-test/run.sh
